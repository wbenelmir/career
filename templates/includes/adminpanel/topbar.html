<div class="d-flex flex-wrap justify-content-between align-items-center gap-3">
    <div>
        <h1 class="admin-page-title mb-1">{% block admin_page_title %}لوحة الإدارة{% endblock %}</h1>
        <p class="admin-page-subtitle">{% block admin_page_subtitle %}إدارة الطلبات وتتبع مراحل معالجتها.{% endblock %}</p>
    </div>

    <div class="d-flex align-items-center gap-3">
        {% if user.is_authenticated %}
            <div class="text-muted small">
                <i class="bi bi-person-circle ms-1"></i>
                {{ user.get_full_name|default:user.username }}
            </div>
        {% endif %}
        {% block admin_actions %}{% endblock %}
    </div>
</div>
